# Spring Boot application name
spring.application.name=api-gateway

# Server port for API Gateway
server.port=8084

# Spring Cloud Gateway routes

# User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# Hotel Rating Service
spring.cloud.gateway.routes[1].id=hotel-rating
spring.cloud.gateway.routes[1].uri=lb://HOTELRATING
spring.cloud.gateway.routes[1].predicates[0]=Path=/ratings/**

# Hotel Service
spring.cloud.gateway.routes[2].id=hotel-service
spring.cloud.gateway.routes[2].uri=lb://HOTELSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/hotels/**

# Eureka configuration
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka